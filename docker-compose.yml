version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - RELAY_APP_URL=${RELAY_APP_URL}
      - API_KEY=${API_KEY}
  frontend:
    build: ./frontend
    ports:
      - '4173:4173'
    environment:
      - VITE_BACKEND_URL=http://backend:8000
